main:
  random_seed: 42

environment:
  area_km: 1

ru:
  ru_x_km: 0.0
  ru_y_km: 0.0

channel:
  cell_radius_km: 0.5 
  p_tx_dbm: 46.0
  path_loss_offset: 128.1
  path_loss_slope: 37.6
  interference_base_dbm: -90.0
  interference_edge_gain_dbm: 10.0
  noise_bandwidth_hz: 180000.0
  thermal_noise_density_dbm_hz: -174.0
  min_distance_km: 0.01

tiers:
  tier-1:
    target_rate_mbps: 20
    weight: 3
    subscription_fee: 100
    probability: 0.2
    min_percent_of_user_to_satisfy: 0.9
  tier-2:
    target_rate_mbps: 10
    weight: 2
    subscription_fee: 80
    probability: 0.3
    min_percent_of_user_to_satisfy: 0.7
  tier-3:
    target_rate_mbps: 5
    weight: 1
    subscription_fee: 50
    probability: 0.5
    min_percent_of_user_to_satisfy: 0.6

lambda: -1000

PRBS:
  num_prbs: 200
  cost: 10
  bandwidth_hz: 2880000.0

reward:
  profit_sensitivity: 1.0
  satisfaction_sensitivity: 10.0

mobility_pattern:
  std_s: 0.5
  clip_to_area: true

lstm:
  input_len: 20
  pred_len: 5

  training:
    num_ues: 100
    num_steps: 1000
    epochs: 20
    batch_size: 128
    lr: 0.001
    hidden_size: 64
    num_layers: 2
    model_out: "lstm/lstm_model.pt"
    norm_out: "lstm/lstm_norm.json"
    device: "auto"
    dataset_csv: "lstm/lstm_training_dataset.csv"

simulation:
  num_ues: 100
  num_steps: 30
  prediction_horizon: 5
  control_horizon: 5
  discount_gamma: 0.99
  dataset_csv: "simulation/simulation_dataset.csv"

optimizer:
  ga:
    population: 1000
    generations: 40
    elite_frac: 0.15
    mutation_rate: 0.2
    crossover_rate: 0.7
    tournament_k: 3
    stall_limit: 10
    seed_full_frac: 0
  pso:
    particles: 30
    iterations: 40
    inertia: 0.7
    c1: 1.4
    c2: 1.4
  rl:
    policy_path: ""

logging:
  enabled: true
  path: "logs/simulation.log"
  append: false
